<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Moved.</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: #fff;
    }

    /* Grid lines background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .scene {
      display: flex;
      align-items: center;
      gap: 160px;
      position: relative;
      z-index: 1;
      padding: 40px;
    }

    /* ── Character ── */
    .character-wrap {
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-16px); }
    }

    .character-wrap::after {
      content: '';
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 16px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
      filter: blur(4px);
      animation: shadow-shrink 3.5s ease-in-out infinite;
    }

    @keyframes shadow-shrink {
      0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.4; }
      50%       { transform: translateX(-50%) scaleX(0.55); opacity: 0.15; }
    }

    .char-svg {
      width: 180px;
      height: 260px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.12));
      transition: filter 0.3s;
    }

    .character-wrap:hover .char-svg {
      filter: drop-shadow(0 0 40px rgba(255,255,255,0.3));
    }

    /* eye blink */
    .eye-l, .eye-r {
      animation: blink 6s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      94%           { transform: scaleY(0.05); }
    }

    /* speech bubble */
    .bubble {
      position: absolute;
      top: 0px;
      left: 200px;
      background: #fff;
      color: #0a0a0a;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.5px;
      padding: 8px 14px;
      border-radius: 12px;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(255,255,255,0.15);
      animation: bubble-anim 6s ease-in-out infinite;
    }

    .bubble::before {
      content: '';
      position: absolute;
      top: 12px;
      left: -8px;
      border: 6px solid transparent;
      border-right-color: #fff;
    }

    @keyframes bubble-anim {
      0%, 75%, 100% { opacity: 1; transform: scale(1); }
      85%           { opacity: 0; transform: scale(0.9); }
    }

    /* ── Content ── */
    .content {
      max-width: 460px;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #666;
      border: 1px solid #333;
      padding: 5px 14px;
      border-radius: 4px;
      margin-bottom: 28px;
      animation: fade-up 0.6s ease both;
    }

    .headline {
      font-size: clamp(42px, 5.5vw, 62px);
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 20px;
      animation: fade-up 0.7s ease 0.1s both;
    }

    .headline .accent {
      color: #0a0a0a;
      -webkit-text-stroke: 1.5px #fff;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #fff;
      margin-bottom: 20px;
      animation: expand 0.8s ease 0.2s both;
    }

    @keyframes expand {
      from { width: 0; opacity: 0; }
      to   { width: 48px; opacity: 1; }
    }

    .sub {
      font-size: 15px;
      color: #888;
      line-height: 1.7;
      margin-bottom: 40px;
      animation: fade-up 0.8s ease 0.3s both;
    }

    .redirect-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 15px 30px;
      background: #fff;
      color: #0a0a0a;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 0 0 rgba(255,255,255,0);
      animation: fade-up 0.9s ease 0.4s both;
    }

    .redirect-btn:hover {
      background: #e5e5e5;
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(255,255,255,0.2);
    }

    .redirect-btn .arrow {
      font-size: 18px;
      transition: transform 0.2s;
    }

    .redirect-btn:hover .arrow { transform: translateX(5px); }

    /* corner decoration */
    .corner {
      position: fixed;
      font-size: 11px;
      color: #333;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .corner.tl { top: 24px; left: 24px; }
    .corner.br { bottom: 24px; right: 24px; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
